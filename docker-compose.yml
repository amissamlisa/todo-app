services:
  postgres:
    build:
      context: ./backend/container/postgres
      dockerfile: Dockerfile
    container_name: todo-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-TodoAppDatabase}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: ./backend
      dockerfile: container/fastapi/Dockerfile
    container_name: todo-fastapi
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      PASSWORD_RESET_URL: ${PASSWORD_RESET_URL}
      SENDER_ADDRESS: ${SENDER_ADDRESS}
      SENDER_ADDRESS_PASSWORD: ${SENDER_ADDRESS_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      ALLOWED_ORIGIN_URL: http://localhost:3000
      COOKIE_SECURE: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend
    ports:
      - "3000:80"
    depends_on:
      - fastapi

volumes:
  postgres_data:
